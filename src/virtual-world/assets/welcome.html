<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Virtual World</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0f;
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1rem;
        letter-spacing: 0.02em;
      }
      .subtitle {
        font-size: 1.1rem;
        color: #9ca3af;
        max-width: 480px;
        line-height: 1.6;
        margin-bottom: 0.6rem;
      }
      .play-btn {
        display: inline-block;
        margin-top: 2.5rem;
        padding: 0.9rem 3rem;
        background: #22c55e;
        color: #000;
        font-size: 1.25rem;
        font-weight: 700;
        border-radius: 8px;
        text-decoration: none;
        letter-spacing: 0.04em;
        transition: background 0.15s, transform 0.1s;
        box-shadow: 0 4px 20px rgba(34, 197, 94, 0.35);
      }
      .play-btn:hover {
        background: #16a34a;
        transform: translateY(-2px);
      }
      .play-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <h1>Virtual World</h1>
    <p class="subtitle">A 2.5D block world rendered with Three.js.</p>
    <p class="subtitle">Move with WASD or arrow keys, pick up items, and chat with other players.</p>
    <a class="play-btn" href="/virtual-world/play">▶ Play</a>
  </body>
</html>
